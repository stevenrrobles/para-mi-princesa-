<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Princesa 💝</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://files.catbox.moe/1sn2km.mp3" type="audio/mpeg">
    </audio>

    <div style="position: fixed; top: 10px; right: 10px; z-index: 1000;">
        <button id="musicToggle" style="background: rgba(255,255,255,0.8); border: 2px solid #ff4d6d; border-radius: 20px; padding: 5px 15px; cursor: pointer; color: #ff4d6d; font-weight: bold;">🎵 Música: OFF</button>
    </div>

    <div class="floating-elements" id="floatingElements"></div>

    <div class="container">
        <h1 id="valentineTitle">Para mi Princesa</h1>
        
        <div class="question-section" id="question1">
            <h2 id="question1Text">¿Sabes cuánto te amo?</h2>
            <button class="cute-btn" onclick="showNextQuestion(2)" id="yesBtn1">¡Mucho!</button>
            <button class="cute-btn" onmouseover="moveButton(this)" id="noBtn1">No...</button>
            
            <div class="secret-answer">
                <button class="cute-btn special" onclick="showNextQuestion(2)" id="secretAnswerBtn">Oprime aquí, mi amor ❤️</button>
            </div>
        </div>

        <div class="question-section hidden" id="question2">
            <h2 id="question2Text">¿Qué tanto me amas tú?</h2>
            <div class="love-meter">
                <input type="range" min="0" max="10000" value="100" class="slider" id="loveMeter">
                <p>
                    <span class="love-value-container">Mi amor por ti es: <span id="loveValue">100</span>%</span>
                </p>
            </div>
            <button class="cute-btn" onclick="showNextQuestion(3)" id="nextBtn">Siguiente ✨</button>
        </div>

        <div class="question-section hidden" id="question3">
            <h2 id="question3Text">¿Me dejarías ser el amor de tu vida por siempre?</h2>
            <button class="cute-btn final-yes" onclick="celebrate()" id="yesBtn3">¡SÍ, MIL VECES SÍ! ❤️</button>
            <button class="cute-btn" onmouseover="moveButton(this)" id="noBtn3">Déjame pensarlo...</button>
        </div>

        <div class="celebration hidden" id="celebration">
            <h2 id="celebrationTitle">¡Eres lo mejor de mi vida! ❤️</h2>
            <div id="photoContainer"></div> <p class="celebration-text" id="celebrationMessage"></p>
            <p class="celebration-text" id="celebrationEmojis">💖✨🌹👸🌈</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
